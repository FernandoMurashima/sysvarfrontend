<div class="layout" [class.sidebar-collapsed]="!sidebarOpen" [class.focus-mode]="focusMode">
  <!-- Sidebar -->
  <aside class="sidebar">
    <nav class="menu">
      <app-nav-item
        *ngFor="let item of menuItems"
        [item]="item">
      </app-nav-item>
    </nav>

    <!-- Rodapé da sidebar: usuário -->
    <div class="sidebar-footer">
      <div class="user-chip">
        <i class="bi bi-person-circle me-2"></i>
        <span>{{ userName }} ({{ userType }})</span>
      </div>
    </div>
  </aside>

  <!-- Área principal -->
  <main class="main">
    <header class="topbar">
      <button class="btn-toggle" (click)="toggleSidebar()" aria-label="Alternar menu">
        <i class="bi bi-list"></i>
        <span>{{ sidebarOpen ? 'Ocultar menu' : 'Menu' }}</span>
      </button>

      <div class="page-title">
        {{ currentPageTitle }}
      </div>

      <div class="topbar-brand">
        <img class="topbar-logo" src="assets/logosysvar.png" alt="Sysvar" />
        <div>
          <strong>Sysvar</strong>
          <span>ERP Varejo</span>
        </div>
      </div>

      <div class="spacer"></div>

      <div class="topbar-user">
        <i class="bi bi-person-circle"></i>
        <span>{{ userName }} ({{ userType }})</span>
      </div>

      <button class="topbar-fullscreen" type="button" (click)="alternarTelaCheia()">
        {{ telaCheia ? 'Sair da tela cheia' : 'Tela cheia' }}
      </button>

      <button class="topbar-logout" type="button" (click)="sair()">Sair</button>
    </header>

    <section class="content">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
