<div class="row-actions">
  <button class="trigger" type="button" [attr.aria-label]="ariaLabel" (click)="open = !open">⋮</button>
  <div class="menu" *ngIf="open" role="menu">
    <button
      *ngFor="let item of visibleActions"
      type="button"
      role="menuitem"
      [class.danger]="item.danger"
      [class.divider]="item.dividerBefore"
      [disabled]="item.disabled"
      (click)="choose(item)">
      <span aria-hidden="true">{{ item.icon || '' }}</span>
      {{ item.label }}
    </button>
  </div>
</div>
